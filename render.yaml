previews:
  generation: manual

services:
  - type: web
    name: koc3-quant-backend
    runtime: python
    plan: starter
    region: oregon
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e .
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeployTrigger: checksPass
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: KOC3_ENVIRONMENT
        value: production
      - key: KOC3_DEMO_MODE
        value: "false"
      - key: KOC3_MARKET_DATA_PROVIDER
        value: yahoo
      - key: KOC3_CORS_ORIGINS
        value: '["https://koc3-quant-frontend.onrender.com"]'
      - key: KOC3_DATABASE_URL
        fromDatabase:
          name: koc3-quant-postgres
          property: connectionString
      - key: KOC3_REDIS_URL
        fromService:
          type: keyvalue
          name: koc3-quant-redis
          property: connectionString

  - type: web
    name: koc3-quant-frontend
    runtime: node
    plan: starter
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_VERSION
        value: 22.10.0
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://koc3-quant-backend.onrender.com/api/v1

  - type: keyvalue
    name: koc3-quant-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: koc3-quant-postgres
    databaseName: koc3
    user: koc3
    plan: starter
    region: oregon
