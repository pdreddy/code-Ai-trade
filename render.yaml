previews:
  generation: manual

services:
  - type: web
    name: ai-quant-backend
    runtime: python
    plan: starter
    region: oregon
    buildCommand: python -m pip install --upgrade pip && python -m pip install -e .
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    autoDeployTrigger: checksPass
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: AI_QUANT_ENVIRONMENT
        value: production
      - key: AI_QUANT_DEMO_MODE
        value: "false"
      - key: AI_QUANT_MARKET_DATA_PROVIDER
        value: yahoo
      - key: AI_QUANT_OPTIONS_DATA_PROVIDER
        value: yahoo
      - key: AI_QUANT_TRADIER_API_TOKEN
        sync: false
      - key: AI_QUANT_TRADIER_BASE_URL
        value: https://sandbox.tradier.com/v1
      - key: AI_QUANT_CORS_ORIGINS
        value: '["https://ai-quant-frontend.onrender.com"]'
      - key: AI_QUANT_DATABASE_URL
        fromDatabase:
          name: ai-quant-postgres
          property: connectionString
      - key: AI_QUANT_REDIS_URL
        fromService:
          type: keyvalue
          name: ai-quant-redis
          property: connectionString

  - type: web
    name: ai-quant-frontend
    runtime: node
    plan: starter
    region: oregon
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /
    autoDeployTrigger: checksPass
    envVars:
      - key: NODE_VERSION
        value: 22.10.0
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://ai-quant-backend.onrender.com/api/v1

  # Auto-trades the live options paper ledger: no real broker, no real money —
  # just removes the manual "Run ledger tick" click by calling the same
  # endpoint on a schedule. Runs against the ai-quant-backend web service, so
  # it reuses that process's in-memory ledger state exactly as a manual click
  # would (see options_forward_ledger.py for why it's in-memory, not durable).
  - type: cron
    name: ai-quant-ledger-tick
    runtime: python
    plan: starter
    region: oregon
    buildCommand: python -m pip install --upgrade pip
    # 14:00 UTC lands shortly after the 9:30am ET open in both EDT and EST,
    # weekdays only.
    schedule: "0 14 * * 1-5"
    startCommand: python scripts/tick_options_ledger.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.13
      - key: AI_QUANT_BACKEND_URL
        value: https://ai-quant-backend.onrender.com/api/v1

  - type: keyvalue
    name: ai-quant-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: ai-quant-postgres
    databaseName: quant
    user: quant
    plan: starter
    region: oregon
